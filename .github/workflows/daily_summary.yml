name: 每日 AI 日报

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间 07:00（UTC+8 = UTC 23:00 前一天）
  workflow_dispatch:         # 支持手动触发

jobs:
  generate-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic markdown

      - name: Run daily summary
        env:
          READWISE_TOKEN:    ${{ secrets.READWISE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          YUNWU_API_KEY:     ${{ secrets.YUNWU_API_KEY }}
          YUNWU_BASE_URL:    ${{ secrets.YUNWU_BASE_URL }}
        run: python daily_summary.py
