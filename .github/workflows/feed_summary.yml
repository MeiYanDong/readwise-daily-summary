name: 每日 Feed 总结

on:
  schedule:
    - cron: '30 23 * * *'   # 北京时间 07:30（UTC 23:30 前一天）
  workflow_dispatch:          # 支持手动触发

jobs:
  generate-feed-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown

      - name: Verify secrets are set
        env:
          READWISE_TOKEN:     ${{ secrets.READWISE_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          YUNWU_API_KEY:      ${{ secrets.YUNWU_API_KEY }}
          YUNWU_BASE_URL:     ${{ secrets.YUNWU_BASE_URL }}
        run: |
          echo "READWISE_TOKEN set: $([ -n \"$READWISE_TOKEN\" ] && echo yes || echo NO)"
          echo "ANTHROPIC_API_KEY set: $([ -n \"$ANTHROPIC_API_KEY\" ] && echo yes || echo NO)"
          echo "ANTHROPIC_BASE_URL: $ANTHROPIC_BASE_URL"
          echo "YUNWU_API_KEY set: $([ -n \"$YUNWU_API_KEY\" ] && echo yes || echo NO)"
          echo "YUNWU_BASE_URL: $YUNWU_BASE_URL"

      - name: Run feed summary
        env:
          READWISE_TOKEN:     ${{ secrets.READWISE_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          YUNWU_API_KEY:      ${{ secrets.YUNWU_API_KEY }}
          YUNWU_BASE_URL:     ${{ secrets.YUNWU_BASE_URL }}
        run: python readwise_feed_summary.py
